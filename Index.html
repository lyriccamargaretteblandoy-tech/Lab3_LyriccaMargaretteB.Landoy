<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body background="img.jpg">

    <h2>Registration</h2>

    <form action="action_page.html" method="GET">

        First Name:<br>
        <input type="text" name="firstname" required><br><br>

        Last Name:<br>
        <input type="text" name="lastname" required><br><br>

        Email:<br>
        <input type="email" name="email" required><br><br>

        Password:<br>
        <input type="password" name="password" required><br><br>

        Birthdate:<br>
        <input type="date" name="birthdate" required><br><br>

        Age:<br>
        <input type="number" name="age" required><br><br>

        Gender:<br>
        <input type="radio" name="gender" value="male" required> Male<br>
        <input type="radio" name="gender" value="female"> Female<br>
        <input type="radio" name="gender" value="other"> Other<br><br>

        Hobbies:<br>
        <input type="checkbox" name="hobby" value="Gaming"> Gaming<br>
        <input type="checkbox" name="hobby" value="Sports"> Sports<br>
        <input type="checkbox" name="hobby" value="Singing"> Singing<br>
        <input type="checkbox" name="hobby" value="Music"> Music<br>
        <input type="checkbox" name="hobby" value="Dancing"> Dancing<br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
